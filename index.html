<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#163f36">
  <meta name="color-scheme" content="light">
  <meta name="description" content="이번 주 중식과 석식 메뉴를 확인하세요.">
  <meta property="og:title" content="주간 메뉴">
  <meta property="og:description" content="날짜별 중식과 석식 메뉴">
  <meta property="og:type" content="website">
  <title>주간 메뉴</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%23163f36'/%3E%3Cpath d='M15 33h34c0 10-7.6 17-17 17s-17-7-17-17Z' fill='%23fff'/%3E%3Cpath d='M20 27c2.5-5.7 6.6-8.5 12-8.5S41.5 21.3 44 27' fill='none' stroke='%23e8bc79' stroke-width='5' stroke-linecap='round'/%3E%3C/svg%3E">

  <style>
    :root {
      color-scheme: light;
      --ink: #14201d;
      --muted: #66716d;
      --muted-strong: #4c5955;
      --paper: #f4f2ec;
      --surface: rgba(255, 255, 255, 0.88);
      --surface-solid: #ffffff;
      --line: rgba(27, 54, 47, 0.11);
      --green-950: #0c2d27;
      --green-900: #123a32;
      --green-800: #184a40;
      --green-700: #236255;
      --green-100: #e5efeb;
      --green-050: #f0f6f3;
      --gold: #d5a05f;
      --gold-soft: #f5e8d5;
      --shadow-soft: 0 10px 34px rgba(21, 45, 39, 0.08);
      --shadow-card: 0 24px 70px rgba(18, 52, 44, 0.14);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-width: 280px;
      background: var(--paper);
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      min-width: 280px;
      min-height: 100vh;
      min-height: 100svh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 8% -4%, rgba(213, 160, 95, 0.18), transparent 30rem),
        radial-gradient(circle at 96% 8%, rgba(35, 98, 85, 0.16), transparent 28rem),
        linear-gradient(180deg, #f8f6f1 0%, var(--paper) 54%, #efede6 100%);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
      word-break: keep-all;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    .ambient {
      position: fixed;
      z-index: -1;
      width: 260px;
      height: 260px;
      border-radius: 999px;
      pointer-events: none;
      filter: blur(4px);
      opacity: 0.7;
    }

    .ambient--one {
      top: -155px;
      right: -110px;
      background: rgba(31, 90, 77, 0.15);
    }

    .ambient--two {
      bottom: -180px;
      left: -150px;
      background: rgba(213, 160, 95, 0.14);
    }

    .app {
      width: min(100%, 580px);
      margin: 0 auto;
      padding:
        calc(24px + env(safe-area-inset-top))
        max(14px, env(safe-area-inset-right))
        calc(44px + env(safe-area-inset-bottom))
        max(14px, env(safe-area-inset-left));
    }

    .hero {
      padding: 5px 3px 21px;
    }

    .hero__topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .eyebrow {
      margin: 0;
      color: var(--green-700);
      font-size: 11px;
      font-weight: 850;
      line-height: 1;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .timezone {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      padding: 5px 9px;
      border: 1px solid rgba(24, 74, 64, 0.1);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.58);
      color: var(--muted-strong);
      font-size: 10px;
      font-weight: 760;
      letter-spacing: -0.01em;
      box-shadow: 0 5px 18px rgba(19, 56, 48, 0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .timezone svg {
      width: 13px;
      height: 13px;
      color: var(--green-700);
    }

    h1 {
      margin: 0;
      color: var(--green-950);
      font-size: clamp(35px, 10.5vw, 48px);
      font-weight: 880;
      line-height: 1.02;
      letter-spacing: -0.065em;
    }

    .week-range {
      min-height: 22px;
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 590;
      line-height: 1.55;
      letter-spacing: -0.025em;
    }

    .date-picker {
      position: relative;
      z-index: 2;
      margin-bottom: 14px;
      padding: 5px;
      border: 1px solid rgba(24, 74, 64, 0.1);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.67);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .date-tabs {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 4px;
      width: 100%;
      overflow: visible;
    }

    .date-button {
      position: relative;
      display: flex;
      min-width: 0;
      min-height: 62px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 7px 2px 8px;
      overflow: hidden;
      appearance: none;
      border: 0;
      border-radius: 15px;
      background: transparent;
      color: var(--muted-strong);
      cursor: pointer;
      isolation: isolate;
      transition:
        color 180ms ease,
        transform 180ms ease,
        background 180ms ease,
        box-shadow 180ms ease;
    }

    .date-button::before {
      position: absolute;
      z-index: -1;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(145deg, var(--green-800), var(--green-950));
      content: "";
      opacity: 0;
      transform: scale(0.92);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .date-button:active {
      transform: scale(0.97);
    }

    .date-button:focus-visible {
      outline: 3px solid rgba(35, 98, 85, 0.28);
      outline-offset: 2px;
    }

    .date-button[aria-selected="true"] {
      color: #ffffff;
      box-shadow: 0 10px 24px rgba(12, 45, 39, 0.22);
    }

    .date-button[aria-selected="true"]::before {
      opacity: 1;
      transform: scale(1);
    }

    .date-button.is-today:not([aria-selected="true"]) {
      background: rgba(229, 239, 235, 0.85);
      color: var(--green-800);
    }

    .date-weekday {
      display: block;
      min-width: 0;
      font-size: 13px;
      font-weight: 820;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .date-number {
      display: block;
      min-width: 0;
      font-size: 12px;
      font-weight: 680;
      line-height: 1.1;
      letter-spacing: -0.02em;
      opacity: 0.78;
      white-space: nowrap;
    }

    .today-dot {
      position: absolute;
      bottom: 5px;
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: var(--gold);
      opacity: 0;
      transform: scale(0.4);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .date-button.is-today .today-dot {
      opacity: 1;
      transform: scale(1);
    }

    .date-button[aria-selected="true"] .today-dot {
      background: #f6c883;
    }

    .menu-area {
      min-height: 370px;
    }

    .menu-panel {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(24, 74, 64, 0.1);
      border-radius: var(--radius-xl);
      background: var(--surface);
      box-shadow: var(--shadow-card);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      animation: panel-in 360ms cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .menu-panel::after {
      position: absolute;
      top: -88px;
      right: -82px;
      width: 190px;
      height: 190px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(213, 160, 95, 0.14), rgba(213, 160, 95, 0));
      content: "";
      pointer-events: none;
    }

    .date-summary {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 23px 22px 19px;
      border-bottom: 1px solid var(--line);
    }

    .date-summary__kicker {
      display: block;
      margin-bottom: 7px;
      color: var(--green-700);
      font-size: 10px;
      font-weight: 860;
      line-height: 1;
      letter-spacing: 0.13em;
    }

    .date-summary h2 {
      margin: 0;
      color: var(--green-950);
      font-size: clamp(23px, 7vw, 29px);
      font-weight: 850;
      line-height: 1.12;
      letter-spacing: -0.055em;
    }

    .date-summary h2 span {
      margin-left: 5px;
      color: var(--muted);
      font-size: 0.56em;
      font-weight: 690;
      letter-spacing: -0.035em;
      vertical-align: 0.18em;
    }

    .date-emblem {
      display: grid;
      width: 50px;
      height: 50px;
      flex: 0 0 auto;
      place-items: center;
      border: 1px solid rgba(35, 98, 85, 0.12);
      border-radius: 17px;
      background: linear-gradient(145deg, #f7fbf9, var(--green-100));
      color: var(--green-800);
      font-size: 20px;
      font-weight: 860;
      letter-spacing: -0.05em;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .meal-stack {
      display: grid;
      gap: 12px;
      padding: 12px;
    }

    .meal-card {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius-lg);
      padding: 20px;
    }

    .meal-card--lunch {
      border: 1px solid rgba(188, 137, 72, 0.16);
      background:
        radial-gradient(circle at 100% 0%, rgba(213, 160, 95, 0.16), transparent 14rem),
        linear-gradient(145deg, #fffdf9, #fbf7ee);
      color: var(--ink);
    }

    .meal-card--dinner {
      border: 1px solid rgba(255, 255, 255, 0.08);
      background:
        radial-gradient(circle at 100% -10%, rgba(213, 160, 95, 0.24), transparent 15rem),
        linear-gradient(145deg, var(--green-800), var(--green-950));
      color: #ffffff;
      box-shadow: 0 18px 40px rgba(12, 45, 39, 0.2);
    }

    .meal-card--featured {
      min-height: 315px;
      padding: 25px 22px 27px;
    }

    .meal-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 17px;
    }

    .meal-icon {
      display: grid;
      width: 42px;
      height: 42px;
      flex: 0 0 auto;
      place-items: center;
      border-radius: 14px;
    }

    .meal-card--lunch .meal-icon {
      background: var(--gold-soft);
      color: #9b642b;
    }

    .meal-card--dinner .meal-icon {
      background: rgba(255, 255, 255, 0.11);
      color: #f6c883;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    .meal-icon svg {
      width: 21px;
      height: 21px;
    }

    .meal-heading-copy {
      min-width: 0;
    }

    .meal-en {
      display: block;
      margin-bottom: 3px;
      font-size: 9px;
      font-weight: 850;
      line-height: 1;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      opacity: 0.62;
    }

    .meal-card h3 {
      margin: 0;
      font-size: 20px;
      font-weight: 850;
      line-height: 1.1;
      letter-spacing: -0.045em;
    }

    .meal-list {
      display: grid;
      gap: 0;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .meal-list li {
      position: relative;
      display: flex;
      align-items: flex-start;
      min-height: 44px;
      padding: 10px 0 10px 17px;
      font-size: clamp(17px, 5vw, 20px);
      font-weight: 690;
      line-height: 1.42;
      letter-spacing: -0.035em;
    }

    .meal-list li + li {
      border-top: 1px solid currentColor;
      border-top-color: rgba(22, 63, 54, 0.08);
    }

    .meal-card--dinner .meal-list li + li {
      border-top-color: rgba(255, 255, 255, 0.1);
    }

    .meal-list li::before {
      position: absolute;
      top: 19px;
      left: 1px;
      width: 5px;
      height: 5px;
      border-radius: 999px;
      background: currentColor;
      content: "";
      opacity: 0.38;
    }

    .meal-card--dinner .meal-list li::before {
      background: #f6c883;
      opacity: 0.95;
    }

    .meal-card--featured .meal-head {
      margin-bottom: 21px;
    }

    .meal-card--featured .meal-icon {
      width: 48px;
      height: 48px;
      border-radius: 16px;
    }

    .meal-card--featured h3 {
      font-size: 23px;
    }

    .meal-card--featured .meal-list li {
      min-height: 51px;
      padding-top: 12px;
      padding-bottom: 12px;
      font-size: clamp(20px, 6vw, 24px);
      font-weight: 720;
    }

    .meal-card--featured .meal-list li::before {
      top: 23px;
    }

    .meal-list li.empty {
      color: var(--muted);
      font-weight: 570;
    }

    .meal-card--dinner .meal-list li.empty {
      color: rgba(255, 255, 255, 0.62);
    }

    .loading-panel,
    .message {
      overflow: hidden;
      border: 1px solid rgba(24, 74, 64, 0.1);
      border-radius: var(--radius-xl);
      background: rgba(255, 255, 255, 0.78);
      box-shadow: var(--shadow-soft);
    }

    .loading-panel {
      padding: 22px;
    }

    .skeleton {
      overflow: hidden;
      border-radius: 999px;
      background: #e7e9e5;
    }

    .skeleton::after {
      display: block;
      width: 45%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.75), transparent);
      content: "";
      animation: shimmer 1.35s ease-in-out infinite;
    }

    .skeleton--title {
      width: 42%;
      height: 25px;
      margin-bottom: 28px;
    }

    .skeleton--line {
      width: 100%;
      height: 17px;
      margin-top: 14px;
    }

    .skeleton--line:nth-child(3) {
      width: 78%;
    }

    .skeleton--line:nth-child(4) {
      width: 88%;
    }

    .message {
      padding: 38px 24px;
      color: var(--muted-strong);
      text-align: center;
      font-size: 15px;
      font-weight: 590;
      line-height: 1.75;
      letter-spacing: -0.025em;
    }

    .message strong {
      display: block;
      margin-bottom: 6px;
      color: var(--green-950);
      font-size: 18px;
    }

    @keyframes panel-in {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.992);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes shimmer {
      from {
        transform: translateX(-120%);
      }
      to {
        transform: translateX(300%);
      }
    }

    @media (min-width: 500px) {
      .app {
        padding-right: 20px;
        padding-left: 20px;
      }

      .meal-stack:not(.meal-stack--single) {
        grid-template-columns: 1fr 1fr;
      }

      .meal-stack:not(.meal-stack--single) .meal-card {
        min-width: 0;
      }
    }

    @media (max-width: 360px) {
      .app {
        padding-right: max(10px, env(safe-area-inset-right));
        padding-left: max(10px, env(safe-area-inset-left));
      }

      .hero {
        padding-right: 2px;
        padding-left: 2px;
      }

      .date-picker {
        padding: 4px;
        border-radius: 18px;
      }

      .date-tabs {
        gap: 2px;
      }

      .date-button {
        min-height: 58px;
        border-radius: 14px;
      }

      .date-weekday {
        font-size: 12px;
      }

      .date-number {
        font-size: 10.5px;
      }

      .date-summary {
        padding-right: 18px;
        padding-left: 18px;
      }

      .meal-card {
        padding: 18px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<body>
  <div class="ambient ambient--one" aria-hidden="true"></div>
  <div class="ambient ambient--two" aria-hidden="true"></div>

  <main class="app">
    <header class="hero">
      <div class="hero__topline">
        <p class="eyebrow">Weekly menu</p>
        <span class="timezone" title="한국 표준시 기준">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="12" cy="12" r="8.5" stroke="currentColor" stroke-width="1.8"/>
            <path d="M12 7.6V12l3.1 1.9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          KST · 한국시간
        </span>
      </div>
      <h1>주간 메뉴</h1>
      <p class="week-range" id="weekRange" aria-live="polite">이번 주 메뉴를 불러오는 중입니다.</p>
    </header>

    <section class="date-picker" aria-label="날짜 선택">
      <nav class="date-tabs" id="dateTabs"></nav>
    </section>

    <section class="menu-area" id="menuArea" aria-live="polite" aria-busy="true">
      <div class="loading-panel" aria-hidden="true">
        <div class="skeleton skeleton--title"></div>
        <div class="skeleton skeleton--line"></div>
        <div class="skeleton skeleton--line"></div>
        <div class="skeleton skeleton--line"></div>
      </div>
    </section>
  </main>

  <script>
    "use strict";

    const KOREA_TIME_ZONE = "Asia/Seoul";
    const DINNER_ONLY_START_MINUTES = 13 * 60 + 30;
    const weekdayNames = ["일요일", "월요일", "화요일", "수요일", "목요일", "금요일", "토요일"];
    const shortWeekdayNames = ["일", "월", "화", "수", "목", "금", "토"];

    const lunchIcon = `
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="12" cy="12" r="3.7" stroke="currentColor" stroke-width="1.8"/>
        <path d="M12 2.8v2.1M12 19.1v2.1M21.2 12h-2.1M4.9 12H2.8M18.5 5.5 17 7M7 17l-1.5 1.5M18.5 18.5 17 17M7 7 5.5 5.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    `;

    const dinnerIcon = `
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M18.7 15.3A7.7 7.7 0 0 1 8.7 5.4a7.8 7.8 0 1 0 10 9.9Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    `;

    let menuList = [];
    let menuByDate = new Map();
    let selectedDate = null;
    let lastKoreaDate = null;
    let lastDinnerOnlyMode = null;

    let trustedClock = null;

    function randomToken() {
      if (globalThis.crypto && typeof globalThis.crypto.randomUUID === "function") {
        return globalThis.crypto.randomUUID();
      }
      return Math.random().toString(36).slice(2);
    }

    function setTrustedClockFromResponse(response) {
      const serverDate = response.headers.get("date");
      if (!serverDate) return false;

      const parsed = Date.parse(serverDate);
      if (!Number.isFinite(parsed)) return false;

      trustedClock = {
        epochMs: parsed,
        performanceMs: performance.now(),
        source: "github-server"
      };
      return true;
    }

    function getTrustedInstant() {
      if (!trustedClock) {
        throw new Error("GitHub 서버 시간을 확인하지 못했습니다.");
      }

      const elapsed = performance.now() - trustedClock.performanceMs;
      return new Date(trustedClock.epochMs + elapsed);
    }

    function getKoreaDateTime() {
      const parts = new Intl.DateTimeFormat("en-CA", {
        timeZone: KOREA_TIME_ZONE,
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hourCycle: "h23"
      }).formatToParts(getTrustedInstant());

      const values = Object.fromEntries(parts.map(part => [part.type, part.value]));
      return {
        dateString: `${values.year}-${values.month}-${values.day}`,
        minutes: Number(values.hour) * 60 + Number(values.minute)
      };
    }

    async function refreshTrustedClock() {
      try {
        const response = await fetch(`menu.txt?clock=${randomToken()}`, {
          method: "HEAD",
          cache: "no-store"
        });
        if (response.ok) setTrustedClockFromResponse(response);
      } catch (_) {
        // 최초 로드에서 확보한 GitHub 서버 시간을 계속 사용합니다.
      }
    }

    function parseMenuText(text) {
      const cleanText = text.replace(/^\uFEFF/, "");
      const blocks = cleanText.split(/\n\s*---\s*\n/g);
      const result = [];

      for (const block of blocks) {
        const lines = block
          .split(/\r?\n/)
          .map(line => line.trim())
          .filter(line => line && !line.startsWith("#"));

        if (!lines.length) continue;

        const dateMatch = lines[0].match(/^\[(\d{4}-\d{2}-\d{2})\]$/);
        if (!dateMatch) continue;

        const item = { date: dateMatch[1], lunch: [], dinner: [] };
        let section = null;

        for (const line of lines.slice(1)) {
          if (line === "중식") {
            section = "lunch";
          } else if (line === "석식") {
            section = "dinner";
          } else if (section) {
            item[section].push(line);
          }
        }

        result.push(item);
      }

      return result.sort((a, b) => a.date.localeCompare(b.date));
    }

    function parseDateParts(dateString) {
      const [year, month, day] = dateString.split("-").map(Number);
      const utcDate = new Date(Date.UTC(year, month - 1, day));
      return {
        year,
        month,
        day,
        weekday: utcDate.getUTCDay()
      };
    }

    function formatDateLabel(dateString) {
      const date = parseDateParts(dateString);
      return {
        tabDate: `${date.month}/${date.day}`,
        shortWeekday: shortWeekdayNames[date.weekday],
        fullDate: `${date.month}월 ${date.day}일`,
        fullWeekday: weekdayNames[date.weekday],
        day: date.day
      };
    }

    function formatWeekRange(menus) {
      const first = parseDateParts(menus[0].date);
      const last = parseDateParts(menus[menus.length - 1].date);

      if (first.year === last.year && first.month === last.month) {
        return `${first.year}년 ${first.month}월 ${first.day}일 – ${last.day}일`;
      }

      if (first.year === last.year) {
        return `${first.year}년 ${first.month}월 ${first.day}일 – ${last.month}월 ${last.day}일`;
      }

      return `${first.year}년 ${first.month}월 ${first.day}일 – ${last.year}년 ${last.month}월 ${last.day}일`;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>'"]/g, character => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "'": "&#39;",
        '"': "&quot;"
      })[character]);
    }

    function isDinnerOnly(dateString) {
      const koreaNow = getKoreaDateTime();
      return dateString === koreaNow.dateString && koreaNow.minutes >= DINNER_ONLY_START_MINUTES;
    }

    function renderMeal(type, items, featured = false) {
      const isDinner = type === "dinner";
      const title = isDinner ? "석식" : "중식";
      const englishTitle = isDinner ? "Dinner" : "Lunch";
      const icon = isDinner ? dinnerIcon : lunchIcon;
      const safeItems = items.length ? items : ["메뉴 미입력"];
      const list = safeItems
        .map(item => `<li class="${item === "메뉴 미입력" ? "empty" : ""}">${escapeHtml(item)}</li>`)
        .join("");

      return `
        <article class="meal-card meal-card--${type}${featured ? " meal-card--featured" : ""}">
          <div class="meal-head">
            <span class="meal-icon">${icon}</span>
            <div class="meal-heading-copy">
              <span class="meal-en">${englishTitle}</span>
              <h3>${title}</h3>
            </div>
          </div>
          <ul class="meal-list">${list}</ul>
        </article>
      `;
    }

    function renderTabs() {
      const koreaToday = getKoreaDateTime().dateString;
      const tabs = document.getElementById("dateTabs");

      tabs.innerHTML = menuList.map(item => {
        const label = formatDateLabel(item.date);
        const isToday = item.date === koreaToday;
        const isSelected = item.date === selectedDate;

        return `
          <button
            class="date-button${isToday ? " is-today" : ""}"
            type="button"
            data-date="${item.date}"
            aria-label="${label.fullDate} ${label.fullWeekday} 메뉴"
            aria-selected="${String(isSelected)}"
            ${isToday ? 'aria-current="date"' : ""}
          >
            <span class="date-weekday">${label.shortWeekday}</span>
            <span class="date-number">${label.tabDate}</span>
            <span class="today-dot" aria-hidden="true"></span>
          </button>
        `;
      }).join("");
    }

    function renderMenu(dateString, options = {}) {
      const item = menuByDate.get(dateString);
      if (!item) return;

      selectedDate = item.date;
      const label = formatDateLabel(item.date);
      const dinnerOnly = isDinnerOnly(item.date);
      const koreaToday = getKoreaDateTime().dateString;
      const isToday = item.date === koreaToday;

      document.getElementById("menuArea").innerHTML = `
        <div class="menu-panel">
          <div class="date-summary">
            <div>
              <span class="date-summary__kicker">${isToday ? (dinnerOnly ? "TODAY'S DINNER" : "TODAY'S MENU") : "SELECTED MENU"}</span>
              <h2>${label.fullDate}<span>${label.fullWeekday}</span></h2>
            </div>
            <div class="date-emblem" aria-hidden="true">${label.day}</div>
          </div>
          <div class="meal-stack${dinnerOnly ? " meal-stack--single" : ""}">
            ${dinnerOnly ? "" : renderMeal("lunch", item.lunch)}
            ${renderMeal("dinner", item.dinner, dinnerOnly)}
          </div>
        </div>
      `;

      document.getElementById("menuArea").setAttribute("aria-busy", "false");
      lastDinnerOnlyMode = dinnerOnly;
      renderTabs();

      if (!options.keepHash) {
        history.replaceState(null, "", `#${item.date}`);
      }
    }

    function chooseInitialDate() {
      const koreaToday = getKoreaDateTime().dateString;
      const hashDate = location.hash.replace(/^#/, "");

      if (menuByDate.has(hashDate)) return hashDate;
      if (menuByDate.has(koreaToday)) return koreaToday;

      const nearestFuture = menuList.find(item => item.date > koreaToday);
      return nearestFuture ? nearestFuture.date : menuList[menuList.length - 1].date;
    }

    function handleClockTick() {
      if (!menuList.length || !selectedDate) return;

      const koreaNow = getKoreaDateTime();
      const previousKoreaDate = lastKoreaDate;
      lastKoreaDate = koreaNow.dateString;

      if (
        previousKoreaDate &&
        previousKoreaDate !== koreaNow.dateString &&
        selectedDate === previousKoreaDate &&
        menuByDate.has(koreaNow.dateString)
      ) {
        renderMenu(koreaNow.dateString);
        return;
      }

      const dinnerOnly = isDinnerOnly(selectedDate);
      const todayMarkerChanged = previousKoreaDate !== koreaNow.dateString;

      if (dinnerOnly !== lastDinnerOnlyMode) {
        renderMenu(selectedDate, { keepHash: true });
      } else if (todayMarkerChanged) {
        renderTabs();
      }
    }

    async function loadMenus() {
      const response = await fetch(`menu.txt?menu=${randomToken()}`, { cache: "no-store" });
      if (!response.ok) throw new Error("menu.txt 파일을 불러오지 못했습니다.");

      if (!setTrustedClockFromResponse(response)) {
        throw new Error("GitHub 서버 시간을 확인하지 못했습니다.");
      }

      menuList = parseMenuText(await response.text());
      if (!menuList.length) throw new Error("표시할 메뉴가 없습니다.");

      menuByDate = new Map(menuList.map(item => [item.date, item]));
      lastKoreaDate = getKoreaDateTime().dateString;
      selectedDate = chooseInitialDate();

      document.getElementById("weekRange").textContent = formatWeekRange(menuList);
      renderMenu(selectedDate, { keepHash: true });

      document.getElementById("dateTabs").addEventListener("click", event => {
        const button = event.target.closest(".date-button");
        if (!button) return;
        renderMenu(button.dataset.date);
      });

      window.setInterval(handleClockTick, 30_000);
      window.setInterval(async () => {
        await refreshTrustedClock();
        handleClockTick();
      }, 10 * 60_000);

      document.addEventListener("visibilitychange", async () => {
        if (document.visibilityState !== "visible") return;
        await refreshTrustedClock();
        handleClockTick();
      });
    }

    loadMenus().catch(error => {
      document.getElementById("dateTabs").innerHTML = "";
      document.getElementById("weekRange").textContent = "메뉴를 표시할 수 없습니다.";
      document.getElementById("menuArea").setAttribute("aria-busy", "false");
      document.getElementById("menuArea").innerHTML = `
        <div class="message">
          <strong>메뉴를 불러오지 못했습니다.</strong>
          ${escapeHtml(error.message)}<br>
          GitHub Pages에서 다시 열어 주세요.
        </div>
      `;
    });
  </script>
</body>
</html>
