<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f7f5ef">
  <title>주간 메뉴</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f5ef;
      --surface: #ffffff;
      --text: #1f2933;
      --muted: #69737d;
      --line: #e4e0d8;
      --accent: #234b3a;
      --accent-soft: #e8f0eb;
      --shadow: 0 14px 38px rgba(31, 41, 51, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      word-break: keep-all;
    }

    .page {
      width: min(760px, calc(100% - 32px));
      margin: 0 auto;
      padding: 44px 0 64px;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 6vw, 46px);
      line-height: 1.05;
      letter-spacing: -0.05em;
    }

    .updated {
      margin: 0 0 3px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .date-tabs {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 16px;
    }

    .date-button {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--text);
      padding: 13px 8px 12px;
      cursor: pointer;
      font: inherit;
      transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
    }

    .date-button:hover { transform: translateY(-1px); }

    .date-button[aria-selected="true"] {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .date-number {
      display: block;
      font-size: 18px;
      font-weight: 750;
      letter-spacing: -0.03em;
    }

    .date-weekday {
      display: block;
      margin-top: 3px;
      font-size: 12px;
      opacity: 0.72;
    }

    .menu-card {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .menu-heading {
      padding: 24px 26px 20px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(135deg, #ffffff 0%, var(--accent-soft) 100%);
    }

    .menu-heading h2 {
      margin: 0;
      font-size: 23px;
      letter-spacing: -0.04em;
    }

    .menu-heading p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .meal-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .meal {
      padding: 26px;
    }

    .meal + .meal {
      border-left: 1px solid var(--line);
    }

    .meal h3 {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 16px;
      font-size: 16px;
      color: var(--accent);
    }

    .meal h3::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
    }

    .meal ul {
      display: grid;
      gap: 12px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .meal li {
      font-size: 18px;
      line-height: 1.45;
      letter-spacing: -0.025em;
    }

    .empty {
      color: var(--muted);
    }

    .message {
      padding: 36px 24px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface);
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
    }

    @media (max-width: 600px) {
      .page {
        width: min(100% - 24px, 760px);
        padding-top: 28px;
      }

      header {
        display: block;
      }

      .updated {
        margin-top: 10px;
      }

      .date-tabs {
        overflow-x: auto;
        grid-template-columns: repeat(5, minmax(74px, 1fr));
        padding-bottom: 3px;
      }

      .meal-grid {
        grid-template-columns: 1fr;
      }

      .meal + .meal {
        border-top: 1px solid var(--line);
        border-left: 0;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <h1>주간 메뉴</h1>
      <p class="updated" id="updatedText">메뉴를 불러오는 중</p>
    </header>

    <nav class="date-tabs" id="dateTabs" aria-label="날짜 선택"></nav>
    <section id="menuArea" aria-live="polite"></section>
  </main>

  <script>
    const weekdayNames = ["일요일", "월요일", "화요일", "수요일", "목요일", "금요일", "토요일"];
    const shortWeekdayNames = ["일", "월", "화", "수", "목", "금", "토"];

    function parseMenuText(text) {
      const cleanText = text.replace(/^\uFEFF/, "");
      const blocks = cleanText.split(/\n\s*---\s*\n/g);
      const result = [];

      for (const block of blocks) {
        const lines = block
          .split(/\r?\n/)
          .map(line => line.trim())
          .filter(line => line && !line.startsWith("#"));

        if (!lines.length) continue;

        const dateMatch = lines[0].match(/^\[(\d{4}-\d{2}-\d{2})\]$/);
        if (!dateMatch) continue;

        const item = { date: dateMatch[1], lunch: [], dinner: [] };
        let section = null;

        for (const line of lines.slice(1)) {
          if (line === "중식") {
            section = "lunch";
          } else if (line === "석식") {
            section = "dinner";
          } else if (section) {
            item[section].push(line);
          }
        }

        result.push(item);
      }

      return result.sort((a, b) => a.date.localeCompare(b.date));
    }

    function makeLocalDate(dateString) {
      const [year, month, day] = dateString.split("-").map(Number);
      return new Date(year, month - 1, day);
    }

    function formatDateLabel(dateString) {
      const date = makeLocalDate(dateString);
      return {
        buttonDate: `${date.getMonth() + 1}/${date.getDate()}`,
        shortWeekday: shortWeekdayNames[date.getDay()],
        fullDate: `${date.getFullYear()}년 ${date.getMonth() + 1}월 ${date.getDate()}일`,
        fullWeekday: weekdayNames[date.getDay()]
      };
    }

    function renderMeal(title, items) {
      const safeItems = items.length ? items : ["메뉴 미입력"];
      const list = safeItems
        .map(item => `<li class="${item === "메뉴 미입력" ? "empty" : ""}">${escapeHtml(item)}</li>`)
        .join("");

      return `
        <article class="meal">
          <h3>${title}</h3>
          <ul>${list}</ul>
        </article>
      `;
    }

    function renderMenu(item) {
      const label = formatDateLabel(item.date);
      document.getElementById("menuArea").innerHTML = `
        <div class="menu-card">
          <div class="menu-heading">
            <h2>${label.fullDate}</h2>
            <p>${label.fullWeekday}</p>
          </div>
          <div class="meal-grid">
            ${renderMeal("중식", item.lunch)}
            ${renderMeal("석식", item.dinner)}
          </div>
        </div>
      `;

      document.querySelectorAll(".date-button").forEach(button => {
        button.setAttribute("aria-selected", String(button.dataset.date === item.date));
      });

      history.replaceState(null, "", `#${item.date}`);
    }

    function escapeHtml(value) {
      return value.replace(/[&<>'"]/g, character => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "'": "&#39;",
        '"': "&quot;"
      })[character]);
    }

    async function loadMenus() {
      const response = await fetch(`menu.txt?v=${Date.now()}`, { cache: "no-store" });
      if (!response.ok) throw new Error("menu.txt 파일을 불러오지 못했습니다.");

      const menus = parseMenuText(await response.text());
      if (!menus.length) throw new Error("표시할 메뉴가 없습니다.");

      const tabs = document.getElementById("dateTabs");
      tabs.innerHTML = menus.map(item => {
        const label = formatDateLabel(item.date);
        return `
          <button class="date-button" type="button" data-date="${item.date}" aria-selected="false">
            <span class="date-number">${label.buttonDate}</span>
            <span class="date-weekday">${label.shortWeekday}</span>
          </button>
        `;
      }).join("");

      const byDate = new Map(menus.map(item => [item.date, item]));
      tabs.addEventListener("click", event => {
        const button = event.target.closest(".date-button");
        if (!button) return;
        renderMenu(byDate.get(button.dataset.date));
      });

      const today = new Date();
      const todayString = [
        today.getFullYear(),
        String(today.getMonth() + 1).padStart(2, "0"),
        String(today.getDate()).padStart(2, "0")
      ].join("-");

      const hashDate = location.hash.replace("#", "");
      const initial = byDate.get(hashDate) || byDate.get(todayString) || menus[0];
      renderMenu(initial);
      document.getElementById("updatedText").textContent = "menu.txt 수정 후 자동 반영";
    }

    loadMenus().catch(error => {
      document.getElementById("dateTabs").innerHTML = "";
      document.getElementById("updatedText").textContent = "불러오기 실패";
      document.getElementById("menuArea").innerHTML = `
        <div class="message">
          ${escapeHtml(error.message)}<br>
          GitHub Pages 또는 웹 서버에서 열어 주세요.
        </div>
      `;
    });
  </script>
</body>
</html>
